<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vue Productivity Tracker</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Vue.js CDN -->
  <script src="https://unpkg.com/vue@3"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div id="app" class="bg-white p-6 rounded-2xl shadow-lg w-96">
    <h1 class="text-2xl font-bold text-center mb-4">
      Productivity Tracker (Vue)
    </h1>

    <div class="flex gap-2">
      <input 
        v-model="newTask"
        @keyup.enter="addTask"
        type="text"
        placeholder="Enter your task"
        class="flex-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
      >

      <button 
        @click="addTask"
        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
        Add
      </button>
    </div>

    <ul class="mt-4 space-y-2">
      <li 
        v-for="(task, index) in tasks" 
        :key="index"
        class="flex justify-between items-center bg-gray-100 p-2 rounded-lg"
      >
        <span>{{ task }}</span>

        <button 
          @click="removeTask(index)"
          class="text-red-500 hover:text-red-700">
          ❌
        </button>
      </li>
    </ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
